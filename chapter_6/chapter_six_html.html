<DOCTYPE html>
    <html>
        <head>
            <title>Petrol_calculator</title>
            <link rel="stylesheet" href="chapter six/chapter_6_css.css"><!--links the css to the html-->
        </head>
        <body>
            <div class="Petrol_calculator">
                <h1>Petrol Calculator</h1>

                <label for="cost">Cost per Liter:$</label>
                <input type="number" id="cost" value="1.72" step="0.01">

                <label for="liters">Liters Purchased:$</label>
                <input type="number" id="liters" value="0" step="0.01">

                <button id="calculate">Calculate Total</button>

                <p id="result">Total Cost:</p>
            </div>

            <script src="chapter six/javascript_for_chap_6.js"></script>
        </body>
    </html>
